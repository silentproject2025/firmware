[env:sanzxcam]
board = sanzxcam
board_build.partitions = custom_16Mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/sanzxcam>
build_flags =
	${env.build_flags}
	-Iboards/sanzxcam
	-Os
	-DCORE_DEBUG_LEVEL=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DALLOW_ALL_GPIO_FOR_IR_RF=1
	-DDISABLE_ALL_LIBRARY_WARNINGS
	-DSANZXCAM
	-DSMOOTH_FONT=1
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DUSE_TFT_ESPI=1

lib_deps =
	${env.lib_deps}
	https://github.com/bmorcelli/ESP32_Button
